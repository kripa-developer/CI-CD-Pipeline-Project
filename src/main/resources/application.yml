server:
  port: 8080

spring:
  application:
    name: demo-app

app:
  version: "${APP_VERSION:1.0.0}"

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
