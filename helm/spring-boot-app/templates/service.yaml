apiVersion: v1
kind: Service
metadata:
  name: {{ include "spring-boot-app.name" . }}-service
  namespace: {{ .Values.namespace }}
  labels:
{{ include "spring-boot-app.labels" . | indent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ include "spring-boot-app.name" . }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
